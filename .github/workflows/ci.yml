name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-lint-test:
    name: api · lint + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - name: install
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        working-directory: api
        run: ruff check app tests
      - name: pytest
        working-directory: api
        run: PYTHONPATH=. pytest -q --cov=app --cov-report=xml --cov-report=term
      - name: upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml

  web-lint-test:
    name: web · lint + build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci || npm install --no-audit --no-fund
      - name: typecheck
        working-directory: web
        run: ./node_modules/.bin/tsc --noEmit
      - name: lint
        working-directory: web
        run: npm run lint
      - name: build
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE: http://api:8000
        run: npm run build

  helm-lint:
    name: helm · lint + render
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint infra/helm/portfolio-platform
      - run: helm template portfolio-platform infra/helm/portfolio-platform > /tmp/rendered.yaml
      - name: install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: validate manifests
        run: kubeconform -strict -summary -ignore-missing-schemas /tmp/rendered.yaml

  trivy-scan:
    name: security · trivy fs + iac
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: table
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: infra/
          severity: HIGH,CRITICAL
          exit-code: "0"
