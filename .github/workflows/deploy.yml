name: deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: image tag to build & deploy
        required: true
        default: edge

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/portfolio-platform-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/portfolio-platform-web

jobs:
  build-and-push:
    name: build + push images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=edge-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: build + push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: trivy image scan (api)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_API }}:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  deploy-fly:
    name: deploy → fly.io
    needs: build-and-push
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    environment:
      name: production
      url: https://portfolio.kshama.dev
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: deploy api
        run: flyctl deploy --remote-only -c infra/fly/api.fly.toml --image ${{ env.IMAGE_API }}:${{ needs.build-and-push.outputs.version }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: deploy web
        run: flyctl deploy --remote-only -c infra/fly/web.fly.toml --image ${{ env.IMAGE_WEB }}:${{ needs.build-and-push.outputs.version }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS https://portfolio-api.fly.dev/healthz; then exit 0; fi
            sleep 5
          done
          exit 1
