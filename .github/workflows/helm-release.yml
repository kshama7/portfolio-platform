name: helm-release

on:
  push:
    branches: [main]
    paths: ["infra/helm/**", ".github/workflows/helm-release.yml"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: azure/setup-helm@v4
      - name: package
        run: |
          mkdir -p .cr-release-packages
          helm package infra/helm/portfolio-platform -d .cr-release-packages/
      - name: login ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: push
        run: |
          for chart in .cr-release-packages/*.tgz; do
            helm push "$chart" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
