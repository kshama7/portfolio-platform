name: load-test

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: smoke
        run: k6 run tests/load/k6-smoke.js -e BASE_URL=https://portfolio-api.fly.dev
      - name: stress (against staging only)
        if: github.event_name == 'workflow_dispatch'
        run: k6 run tests/load/k6-stress.js -e BASE_URL=https://staging.portfolio-api.fly.dev
