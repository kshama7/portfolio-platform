<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <style>
      .lbl { fill: #f3f4f6; font-size: 12px; font-weight: 600; }
      .sub { fill: #9ca3af; font-size: 10px; }
      .grp { fill: none; stroke: #1f1f25; stroke-width: 1; rx: 8; ry: 8; }
      .grp-title { fill: #6b7280; font-size: 10px; letter-spacing: 0.08em; }
      .node { fill: #16161a; stroke: #1f1f25; rx: 6; ry: 6; }
      .node-accent { fill: #16161a; stroke: #22d3ee; stroke-width: 1.5; rx: 6; ry: 6; }
      .edge { stroke: #6b7280; stroke-width: 1.2; fill: none; }
      .edge-data { stroke: #22d3ee; stroke-width: 1.2; fill: none; stroke-dasharray: 3 2; }
    </style>
  </defs>
  <rect width="980" height="620" fill="url(#bg)"/>

  <!-- user / cloudflare -->
  <rect x="40" y="40" width="160" height="64" class="node"/>
  <text x="120" y="65" text-anchor="middle" class="lbl">User</text>
  <text x="120" y="82" text-anchor="middle" class="sub">browser · k6 · curl</text>
  <text x="120" y="95" text-anchor="middle" class="sub">portfolio.kshama.dev</text>

  <rect x="240" y="40" width="160" height="64" class="node"/>
  <text x="320" y="65" text-anchor="middle" class="lbl">Cloudflare</text>
  <text x="320" y="82" text-anchor="middle" class="sub">DNS · TLS · WAF</text>
  <text x="320" y="95" text-anchor="middle" class="sub">terraformed</text>

  <line x1="200" y1="72" x2="240" y2="72" class="edge" marker-end="url(#arr)"/>
  <line x1="400" y1="72" x2="440" y2="72" class="edge" marker-end="url(#arr)"/>

  <!-- fly platform group -->
  <rect x="430" y="20" width="510" height="320" class="grp"/>
  <text x="450" y="40" class="grp-title">FLY.IO — IAD REGION</text>

  <rect x="450" y="56" width="200" height="72" class="node-accent"/>
  <text x="550" y="78" text-anchor="middle" class="lbl">Web (Next.js)</text>
  <text x="550" y="94" text-anchor="middle" class="sub">SSR · standalone build</text>
  <text x="550" y="108" text-anchor="middle" class="sub">2 machines · auto-scale 6</text>
  <text x="550" y="120" text-anchor="middle" class="sub">256 MB RAM each</text>

  <rect x="700" y="56" width="220" height="72" class="node-accent"/>
  <text x="810" y="78" text-anchor="middle" class="lbl">API (FastAPI)</text>
  <text x="810" y="94" text-anchor="middle" class="sub">Markowitz · HRP · 5× DRL</text>
  <text x="810" y="108" text-anchor="middle" class="sub">2 machines · auto-scale 10</text>
  <text x="810" y="120" text-anchor="middle" class="sub">512 MB · /metrics · /healthz</text>

  <line x1="650" y1="92" x2="700" y2="92" class="edge" marker-end="url(#arr)"/>

  <!-- internals of API -->
  <rect x="700" y="144" width="220" height="180" class="grp"/>
  <text x="715" y="162" class="grp-title">INSIDE THE API</text>

  <rect x="715" y="172" width="190" height="36" class="node"/>
  <text x="810" y="194" text-anchor="middle" class="sub">Classical optimizers (pypfopt)</text>

  <rect x="715" y="216" width="190" height="36" class="node"/>
  <text x="810" y="238" text-anchor="middle" class="sub">DRL replay (PPO·DDPG·A2C·SAC·TD3)</text>

  <rect x="715" y="260" width="190" height="36" class="node"/>
  <text x="810" y="282" text-anchor="middle" class="sub">Backtest engine (Sharpe · DD · Sortino)</text>

  <rect x="715" y="304" width="190" height="14" class="node" fill="#1f1f25"/>
  <text x="810" y="314" text-anchor="middle" class="sub">middleware → Prom metrics</text>

  <!-- data source -->
  <rect x="450" y="160" width="200" height="44" class="node"/>
  <text x="550" y="180" text-anchor="middle" class="sub">Yahoo Finance (live)</text>
  <text x="550" y="195" text-anchor="middle" class="sub">+ bundled NIFTY50 CSV</text>
  <line x1="650" y1="182" x2="700" y2="216" class="edge-data" marker-end="url(#arr)"/>

  <!-- observability -->
  <rect x="40" y="360" width="900" height="180" class="grp"/>
  <text x="60" y="378" class="grp-title">OBSERVABILITY · SRE</text>

  <rect x="60" y="395" width="170" height="64" class="node-accent"/>
  <text x="145" y="416" text-anchor="middle" class="lbl">Prometheus</text>
  <text x="145" y="432" text-anchor="middle" class="sub">recording + alert rules</text>
  <text x="145" y="446" text-anchor="middle" class="sub">burn-rate SLO alerts</text>

  <rect x="250" y="395" width="170" height="64" class="node-accent"/>
  <text x="335" y="416" text-anchor="middle" class="lbl">Grafana Cloud</text>
  <text x="335" y="432" text-anchor="middle" class="sub">RED + SLO dashboard</text>
  <text x="335" y="446" text-anchor="middle" class="sub">10 panels · 30s refresh</text>

  <rect x="440" y="395" width="170" height="64" class="node"/>
  <text x="525" y="416" text-anchor="middle" class="lbl">SLOs</text>
  <text x="525" y="432" text-anchor="middle" class="sub">99.5% avail · p95 &lt; 1s</text>
  <text x="525" y="446" text-anchor="middle" class="sub">30d rolling window</text>

  <rect x="630" y="395" width="170" height="64" class="node"/>
  <text x="715" y="416" text-anchor="middle" class="lbl">Runbook</text>
  <text x="715" y="432" text-anchor="middle" class="sub">per-alert playbook</text>
  <text x="715" y="446" text-anchor="middle" class="sub">postmortem template</text>

  <rect x="820" y="395" width="100" height="64" class="node"/>
  <text x="870" y="416" text-anchor="middle" class="lbl">PagerDuty</text>
  <text x="870" y="432" text-anchor="middle" class="sub">page on burn</text>

  <line x1="810" y1="316" x2="145" y2="395" class="edge-data" marker-end="url(#arr)"/>
  <line x1="230" y1="427" x2="250" y2="427" class="edge" marker-end="url(#arr)"/>
  <line x1="610" y1="427" x2="630" y2="427" class="edge" marker-end="url(#arr)"/>
  <line x1="800" y1="427" x2="820" y2="427" class="edge" marker-end="url(#arr)"/>

  <rect x="60" y="475" width="320" height="50" class="node"/>
  <text x="220" y="494" text-anchor="middle" class="sub">GitHub Actions: lint · test · trivy</text>
  <text x="220" y="508" text-anchor="middle" class="sub">multi-arch build → GHCR → ArgoCD</text>

  <rect x="400" y="475" width="200" height="50" class="node"/>
  <text x="500" y="494" text-anchor="middle" class="sub">ArgoCD ApplicationSet</text>
  <text x="500" y="508" text-anchor="middle" class="sub">dev → staging → prod</text>

  <rect x="620" y="475" width="180" height="50" class="node"/>
  <text x="710" y="494" text-anchor="middle" class="sub">Helm chart</text>
  <text x="710" y="508" text-anchor="middle" class="sub">HPA · PDB · NetPol · SM</text>

  <rect x="820" y="475" width="100" height="50" class="node"/>
  <text x="870" y="494" text-anchor="middle" class="sub">Terraform</text>
  <text x="870" y="508" text-anchor="middle" class="sub">cloud infra</text>

  <line x1="380" y1="500" x2="400" y2="500" class="edge" marker-end="url(#arr)"/>
  <line x1="600" y1="500" x2="620" y2="500" class="edge" marker-end="url(#arr)"/>

  <text x="490" y="580" text-anchor="middle" class="sub">SRE-for-ML · five DRL agents · classical optimizers · live deployment · GitOps · burn-rate alerts</text>
</svg>
