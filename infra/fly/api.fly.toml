app = "portfolio-api"
primary_region = "iad"

[build]
  image = "ghcr.io/kshama7/portfolio-platform-api:latest"

[env]
  APP_ENV = "prod"
  APP_LOG_LEVEL = "INFO"
  APP_LOG_FORMAT = "json"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[metrics]
  port = 8000
  path = "/metrics"
