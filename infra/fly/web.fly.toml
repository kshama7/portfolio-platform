app = "portfolio-web"
primary_region = "iad"

[build]
  image = "ghcr.io/kshama7/portfolio-platform-web:latest"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_API_BASE = "https://portfolio-api.fly.dev"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
