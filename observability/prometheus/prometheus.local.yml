global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local
    env: dev

rule_files:
  - /etc/prometheus/rules.yaml
  - /etc/prometheus/alerts.yaml

scrape_configs:
  - job_name: portfolio-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: portfolio-api
          env: dev
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
